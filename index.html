<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de IMC</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #00c896;
      --accent-dim: #00c89622;
      --danger: #ff6b6b;
      --warn: #ffa94d;
      --ok: #00c896;
      --good: #51cf66;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }

    .header {
      margin-bottom: 2rem;
    }

    .tag {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      display: inline-block;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
    }

    input[type="number"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .unit {
      padding: 0 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      border-left: 1px solid var(--border);
      height: 100%;
      display: flex;
      align-items: center;
      background: var(--surface);
    }

    .btn-calc {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-calc:hover { opacity: 0.88; }
    .btn-calc:active { transform: scale(0.98); }

    /* Result */
    .result {
      display: none;
      margin-top: 1.8rem;
      border-top: 1px solid var(--border);
      padding-top: 1.8rem;
    }

    .result.visible { display: block; }

    .imc-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 3.5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .imc-label {
      margin-top: 0.3rem;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .imc-desc {
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Scale bar */
    .scale {
      margin: 1.5rem 0 1.2rem;
      position: relative;
    }

    .scale-bar {
      height: 6px;
      border-radius: 99px;
      background: linear-gradient(to right,
        #51cfff 0%, #51cfff 16%,
        #51cf66 16%, #51cf66 38%,
        #ffa94d 38%, #ffa94d 62%,
        #ff6b6b 62%, #ff6b6b 80%,
        #c92a2a 80%, #c92a2a 100%
      );
      position: relative;
    }

    .scale-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px white;
      transition: left 0.5s cubic-bezier(.34,1.56,.64,1);
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .btn-whatsapp {
      width: 100%;
      padding: 0.85rem;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
      text-decoration: none;
    }

    .btn-whatsapp:hover { opacity: 0.9; }
    .btn-whatsapp:active { transform: scale(0.98); }

    .wa-icon { width: 20px; height: 20px; fill: white; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="tag">Tecnologias Móveis</div>
    <h1>Calcule seu <span>IMC</span></h1>
    <p class="subtitle">Índice de Massa Corporal — resultado enviado pelo WhatsApp.</p>
  </div>

  <div class="field">
    <label for="peso">Peso</label>
    <div class="input-wrap">
      <input type="number" id="peso" placeholder="70" min="1" max="500" step="0.1" />
      <span class="unit">kg</span>
    </div>
  </div>

  <div class="field">
    <label for="altura">Altura</label>
    <div class="input-wrap">
      <input type="number" id="altura" placeholder="1.70" min="0.5" max="3" step="0.01" />
      <span class="unit">m</span>
    </div>
  </div>

  <button class="btn-calc" onclick="calcular()">Calcular IMC</button>

  <div class="result" id="result">
    <div class="imc-value" id="imc-value">—</div>
    <div class="imc-label" id="imc-label">—</div>
    <div class="imc-desc" id="imc-desc">—</div>

    <div class="scale">
      <div class="scale-bar">
        <div class="scale-marker" id="marker" style="left: 0%"></div>
      </div>
      <div class="scale-labels">
        <span>Abaixo</span>
        <span>Normal</span>
        <span>Sobrepeso</span>
        <span>Obesidade</span>
      </div>
    </div>

    <a class="btn-whatsapp" id="btn-wa" href="#" target="_blank">
      <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Enviar pelo WhatsApp
    </a>
  </div>
</div>

<script>
  const classificacoes = [
    { max: 18.5, label: "Abaixo do peso",    desc: "IMC abaixo de 18,5",      color: "#51cfff", pct: 8  },
    { max: 25.0, label: "Peso normal",        desc: "IMC entre 18,5 e 24,9",   color: "#51cf66", pct: 27 },
    { max: 30.0, label: "Sobrepeso",          desc: "IMC entre 25,0 e 29,9",   color: "#ffa94d", pct: 50 },
    { max: 35.0, label: "Obesidade grau I",   desc: "IMC entre 30,0 e 34,9",   color: "#ff6b6b", pct: 68 },
    { max: 40.0, label: "Obesidade grau II",  desc: "IMC entre 35,0 e 39,9",   color: "#ff4d4d", pct: 82 },
    { max: Infinity, label: "Obesidade grau III", desc: "IMC acima de 40,0",   color: "#c92a2a", pct: 94 },
  ];

  function calcular() {
    const peso = parseFloat(document.getElementById('peso').value);
    const altura = parseFloat(document.getElementById('altura').value);

    if (!peso || !altura || peso <= 0 || altura <= 0) {
      alert('Por favor, preencha o peso e a altura corretamente.');
      return;
    }

    const imc = peso / (altura * altura);
    const cls = classificacoes.find(c => imc < c.max);

    document.getElementById('imc-value').textContent = imc.toFixed(2);
    document.getElementById('imc-value').style.color = cls.color;
    document.getElementById('imc-label').textContent = cls.label;
    document.getElementById('imc-label').style.color = cls.color;
    document.getElementById('imc-desc').textContent = cls.desc;

    document.getElementById('marker').style.left = cls.pct + '%';

    const msg = encodeURIComponent(
      `*Resultado do meu IMC* 🏃\n\n` +
      `• Peso: ${peso} kg\n` +
      `• Altura: ${altura} m\n` +
      `• *IMC: ${imc.toFixed(2)}*\n` +
      `• Classificação: *${cls.label}*\n\n` +
      `_Calculado em: ${new Date().toLocaleDateString('pt-BR')}_`
    );

    document.getElementById('btn-wa').href = `https://wa.me/?text=${msg}`;
    document.getElementById('result').classList.add('visible');
  }

  // Allow Enter key
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('keydown', e => { if (e.key === 'Enter') calcular(); });
  });
</script>
</body>
</html>
